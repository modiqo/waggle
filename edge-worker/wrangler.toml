name = "waggle-edge"
main = "build/worker/shim.mjs"
compatibility_date = "2026-06-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

[durable_objects]
bindings = [{ name = "HIVE", class_name = "Hive" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Hive"]

# Created per account: `npx wrangler kv namespace create CACHE` and
# `npx wrangler r2 bucket create waggle-blobs` — see docs/guide/09.
[[kv_namespaces]]
binding = "CACHE"
id = "71908207db1f468eae7baa48bc28c6a9"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "waggle-blobs"
