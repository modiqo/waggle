<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 210" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <defs>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="860" height="210" fill="#ffffff"/>
  <text x="430" y="30" text-anchor="middle" font-weight="bold" fill="#223">one search request, end to end</text>
  <rect x="20" y="60" width="130" height="60" rx="8" fill="#eef6ee" stroke="#4a8a4a"/>
  <text x="85" y="85" text-anchor="middle" fill="#1e4620">agent</text>
  <text x="85" y="103" text-anchor="middle" fill="#456" font-size="11">search {token, re}</text>
  <rect x="200" y="60" width="130" height="60" rx="8" fill="#fef4ec" stroke="#e07b39"/>
  <text x="265" y="80" text-anchor="middle" fill="#223">worker</text>
  <text x="265" y="96" text-anchor="middle" fill="#667" font-size="11">bearer? tenant?</text>
  <text x="265" y="112" text-anchor="middle" fill="#667" font-size="11">then delegate</text>
  <rect x="380" y="60" width="150" height="60" rx="8" fill="#fef4ec" stroke="#e07b39"/>
  <text x="455" y="80" text-anchor="middle" fill="#223">Durable Object</text>
  <text x="455" y="96" text-anchor="middle" fill="#667" font-size="11">manifest → content ref</text>
  <text x="455" y="112" text-anchor="middle" fill="#667" font-size="11">records `read` (I-1)</text>
  <rect x="580" y="60" width="120" height="60" rx="8" fill="#fef4ec" stroke="#e07b39"/>
  <text x="640" y="85" text-anchor="middle" fill="#223">R2</text>
  <text x="640" y="103" text-anchor="middle" fill="#667" font-size="11">blob, hash-verified</text>
  <rect x="740" y="60" width="100" height="60" rx="8" fill="#f5f7fa" stroke="#8899aa"/>
  <text x="790" y="85" text-anchor="middle" fill="#223">lens engine</text>
  <text x="790" y="103" text-anchor="middle" fill="#667" font-size="11">regex, budgets</text>
  <line x1="150" y1="90" x2="198" y2="90" stroke="#555" stroke-width="2" marker-end="url(#b)"/>
  <line x1="330" y1="90" x2="378" y2="90" stroke="#555" stroke-width="2" marker-end="url(#b)"/>
  <line x1="530" y1="90" x2="578" y2="90" stroke="#555" stroke-width="2" marker-end="url(#b)"/>
  <line x1="700" y1="90" x2="738" y2="90" stroke="#555" stroke-width="2" marker-end="url(#b)"/>
  <path d="M 790 122 L 790 160 L 85 160 L 85 124" fill="none" stroke="#4a8a4a" stroke-width="2" marker-end="url(#b)"/>
  <text x="430" y="152" text-anchor="middle" fill="#1e4620" font-weight="bold">only the MATCHES travel back (budgeted envelope)</text>
  <text x="430" y="190" text-anchor="middle" fill="#667" font-size="12">the artifact never moved · the laptop can be asleep · the funnel counted the read</text>
</svg>
