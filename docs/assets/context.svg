<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 610" width="1120" height="610" font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace">
  <style>
    text { font-family: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace; }
    .ink{fill:#141414} .muted{fill:#6a6b70} .faint{fill:#9b9ca1}
    .red{fill:#b23b30} .honey{fill:#b8791a} .green{fill:#1f7a3f}
    .b{font-weight:600}
  </style>

  <rect x="0" y="0" width="1120" height="610" fill="#ffffff"/>

  <text x="560" y="56" text-anchor="middle" font-size="30" class="ink b" letter-spacing="-0.5">What enters the consumer's context window</text>
  <text x="560" y="90" text-anchor="middle" font-size="16" class="muted">only the reference travels — the artifact never auto-expands</text>

  <!-- ============ CARD 1 : copy ============ -->
  <rect x="40" y="128" width="328" height="348" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="62" y="163" font-size="14.5" class="red b">copy · paste the artifact</text>
  <line x1="40" y1="180" x2="368" y2="180" stroke="#f0d9d6" stroke-width="1.5"/>
  <g fill="#e8e3dd">
    <rect x="62" y="202" width="284" height="9" rx="2"/>
    <rect x="62" y="224" width="238" height="9" rx="2"/>
    <rect x="62" y="246" width="272" height="9" rx="2"/>
    <rect x="62" y="268" width="216" height="9" rx="2"/>
    <rect x="62" y="290" width="284" height="9" rx="2"/>
    <rect x="62" y="312" width="198" height="9" rx="2"/>
    <rect x="62" y="334" width="258" height="9" rx="2"/>
    <rect x="62" y="356" width="176" height="9" rx="2"/>
    <rect x="62" y="378" width="248" height="9" rx="2"/>
    <rect x="62" y="400" width="150" height="9" rx="2"/>
    <rect x="62" y="422" width="210" height="9" rx="2"/>
  </g>
  <text x="204" y="510" text-anchor="middle" font-size="14.5" class="red">re-billed every turn</text>

  <!-- ============ CARD 2 : raw path ============ -->
  <rect x="396" y="128" width="328" height="348" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="418" y="163" font-size="14.5" class="muted b">raw path · cheap but blind</text>
  <line x1="396" y1="180" x2="724" y2="180" stroke="#e6e6e2" stroke-width="1.5"/>
  <rect x="418" y="200" width="284" height="40" rx="4" fill="#f6f6f4" stroke="#d3d3ce" stroke-width="1.5"/>
  <text x="434" y="225" font-size="15" class="ink">/tmp/analysis.md</text>
  <text x="648" y="392" text-anchor="middle" font-size="88" fill="#eeeee9" class="b">?</text>
  <g font-size="15" class="faint">
    <text x="418" y="292">no attribution</text>
    <text x="418" y="322">no adaptation</text>
    <text x="418" y="352">no lifecycle</text>
    <text x="418" y="382">no telemetry</text>
    <text x="418" y="412">no reach</text>
  </g>
  <text x="560" y="510" text-anchor="middle" font-size="14.5" class="muted">30 bytes, but silent</text>

  <!-- ============ CARD 3 : waggle ============ -->
  <rect x="752" y="128" width="328" height="348" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="774" y="163" font-size="14.5" class="honey b">waggle · answers back</text>
  <line x1="752" y1="180" x2="1080" y2="180" stroke="#ecdcc0" stroke-width="1.5"/>
  <rect x="774" y="198" width="152" height="42" rx="5" fill="#b8791a"/>
  <text x="850" y="225" text-anchor="middle" font-size="16" fill="#ffffff" class="b">b2uQyZUC</text>
  <g font-size="14">
    <rect x="774" y="256" width="284" height="34" rx="4" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
    <text x="790" y="278" class="ink">resolve</text>
    <text x="1042" y="278" text-anchor="end" class="muted">its projection</text>

    <rect x="774" y="298" width="284" height="34" rx="4" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
    <text x="790" y="320" class="ink">search "pricing"</text>
    <text x="1042" y="320" text-anchor="end" class="muted">4 matches</text>

    <rect x="774" y="340" width="284" height="34" rx="4" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
    <text x="790" y="362" class="ink">read --lines 40–80</text>
    <text x="1042" y="362" text-anchor="end" class="muted">a window</text>

    <rect x="774" y="382" width="284" height="34" rx="4" fill="#eef6f0" stroke="#cfe3d6" stroke-width="1.5"/>
    <text x="790" y="404" font-size="13" class="green b">funnel</text>
    <text x="1042" y="404" text-anchor="end" font-size="13" class="green">resolve 1 · read 2 · run 1</text>
  </g>
  <text x="916" y="510" text-anchor="middle" font-size="14" class="ink">30 bytes · budgeted slices · counted</text>

  <text x="560" y="576" text-anchor="middle" font-size="16" class="muted">cheap like a path — <tspan class="honey">but the reference answers back</tspan></text>
</svg>
