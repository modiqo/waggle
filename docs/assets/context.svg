<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 590" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="ca" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a6d3b"/>
    </marker>
  </defs>
  <rect width="1100" height="590" fill="#fffdf8"/>

  <text x="550" y="42" text-anchor="middle" font-size="19" font-weight="bold" fill="#1f2430">what actually enters the subagent's context window</text>

  <!-- ===== panel 1: full handoff (40..360) ===== -->
  <text x="200" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#b3423a">full handoff</text>
  <rect x="115" y="110" width="170" height="270" rx="10" fill="#ffffff" stroke="#9aa1ad" stroke-width="1.5"/>
  <text x="200" y="134" text-anchor="middle" font-size="11" fill="#667085">context window</text>
  <text x="135" y="158" font-size="11.5" fill="#1f2430">task: analyze...</text>
  <rect x="130" y="170" width="140" height="192" rx="6" fill="#f8e5e3" stroke="#b3423a"/>
  <text x="200" y="255" text-anchor="middle" font-size="12.5" fill="#7a2d27">the whole</text>
  <text x="200" y="273" text-anchor="middle" font-size="12.5" fill="#7a2d27">artifact, again</text>
  <text x="200" y="296" text-anchor="middle" font-size="12" fill="#a5554e">8,000 tokens</text>
  <g font-size="12" fill="#7a4340">
    <text x="200" y="428" text-anchor="middle">expensive, per subagent</text>
    <text x="200" y="448" text-anchor="middle">stale the moment it's sent</text>
    <text x="200" y="468" text-anchor="middle">lossy when summarized</text>
  </g>

  <!-- ===== panel 2: raw reference (380..700) ===== -->
  <text x="540" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#667085">raw reference</text>
  <rect x="455" y="110" width="170" height="270" rx="10" fill="#ffffff" stroke="#9aa1ad" stroke-width="1.5"/>
  <text x="540" y="134" text-anchor="middle" font-size="11" fill="#667085">context window</text>
  <text x="475" y="158" font-size="11.5" fill="#1f2430">task: analyze...</text>
  <rect x="470" y="170" width="140" height="24" rx="5" fill="#f2f2ee" stroke="#9aa1ad"/>
  <text x="540" y="187" text-anchor="middle" font-size="11.5" fill="#1f2430">/tmp/result.md</text>
  <g font-size="12.5" fill="#8b93a2">
    <text x="540" y="250" text-anchor="middle">who made it?</text>
    <text x="540" y="274" text-anchor="middle">still current?</text>
    <text x="540" y="298" text-anchor="middle">readable here?</text>
    <text x="540" y="322" text-anchor="middle">was it read?</text>
  </g>
  <g font-size="12" fill="#5c6470">
    <text x="540" y="428" text-anchor="middle">cheap — ~10 tokens</text>
    <text x="540" y="448" text-anchor="middle">but the reference is blind,</text>
    <text x="540" y="468" text-anchor="middle">and dies at the machine edge</text>
  </g>

  <!-- ===== panel 3: waggle (720..1060) ===== -->
  <text x="890" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a6d3b">waggle token</text>
  <rect x="735" y="110" width="170" height="270" rx="10" fill="#ffffff" stroke="#9aa1ad" stroke-width="1.5"/>
  <text x="820" y="134" text-anchor="middle" font-size="11" fill="#667085">context window</text>
  <text x="755" y="158" font-size="11.5" fill="#1f2430">task: analyze...</text>
  <rect x="750" y="170" width="140" height="24" rx="12" fill="#fdf3dd" stroke="#c9860a" stroke-width="1.5"/>
  <text x="820" y="187" text-anchor="middle" font-size="11.5" fill="#6b4a08">wg: 7Kp2xQ9f</text>

  <!-- budgeted slices, inside the window -->
  <g font-size="11">
    <rect x="750" y="240" width="140" height="22" rx="5" fill="#eef4ee" stroke="#3a7d44"/>
    <text x="820" y="255" text-anchor="middle" fill="#2c5134">its projection</text>
    <rect x="750" y="272" width="112" height="22" rx="5" fill="#eef4ee" stroke="#3a7d44"/>
    <text x="806" y="287" text-anchor="middle" fill="#2c5134">3 matches</text>
    <rect x="750" y="304" width="126" height="22" rx="5" fill="#eef4ee" stroke="#3a7d44"/>
    <text x="813" y="319" text-anchor="middle" fill="#2c5134">lines 40-80</text>
  </g>

  <!-- the tool round-trip -->
  <rect x="960" y="228" width="92" height="34" rx="8" fill="#fdf3dd" stroke="#c9860a" stroke-width="1.5"/>
  <text x="1006" y="250" text-anchor="middle" font-size="12" fill="#6b4a08">waggled</text>
  <path d="M 905 208 C 950 208 990 214 1002 226" fill="none" stroke="#8a6d3b" stroke-width="1.8" marker-end="url(#ca)"/>
  <text x="988" y="196" text-anchor="middle" font-size="10.5" fill="#8a6d3b">resolve, search, read</text>
  <path d="M 1002 264 C 990 292 950 300 908 300" fill="none" stroke="#3a7d44" stroke-width="1.8" marker-end="url(#ca)"/>
  <text x="1000" y="316" text-anchor="middle" font-size="10.5" fill="#2c5134">budgeted slices</text>

  <g font-size="12" fill="#3a5a40">
    <text x="890" y="428" text-anchor="middle">~30 tokens in context</text>
    <text x="890" y="448" text-anchor="middle">content arrives only as the</text>
    <text x="890" y="468" text-anchor="middle">slices this consumer asked for</text>
  </g>

  <!-- the rule -->
  <line x1="80" y1="502" x2="1020" y2="502" stroke="#e3ddd0" stroke-width="1.5"/>
  <text x="550" y="536" text-anchor="middle" font-size="13.5" fill="#1f2430">the rule: the token travels in context; the artifact never auto-expands.</text>
  <text x="550" y="560" text-anchor="middle" font-size="13.5" fill="#1f2430">resolve, read, and search return only what was asked for, under byte budgets.</text>
</svg>
