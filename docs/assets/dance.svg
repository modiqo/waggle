<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace">
  <style>
    text { font-family: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace; }
    .ink{fill:#141414} .muted{fill:#6a6b70} .faint{fill:#9b9ca1}
    .honey{fill:#b8791a} .b{font-weight:600}
  </style>
  <defs>
    <marker id="run" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L9 5 L0 9 Z" fill="#b8791a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="600" fill="#ffffff"/>

  <!-- title -->
  <text x="52" y="66" font-size="27" class="ink b" letter-spacing="-0.5">She carries a reference,</text>
  <text x="52" y="100" font-size="27" class="ink b" letter-spacing="-0.5">not the field.</text>
  <text x="52" y="132" font-size="14" class="muted">the waggle dance — an attributed, resolvable claim that the nectar exists</text>

  <!-- sun: the reference direction -->
  <g transform="translate(752 168)">
    <circle r="24" fill="#faf3e6" stroke="#b8791a" stroke-width="1.5"/>
    <g stroke="#b8791a" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-38" x2="0" y2="-30"/><line x1="27" y1="-27" x2="21" y2="-21"/>
      <line x1="38" y1="0" x2="30" y2="0"/><line x1="27" y1="27" x2="21" y2="21"/>
      <line x1="0" y1="38" x2="0" y2="30"/><line x1="-27" y1="27" x2="-21" y2="21"/>
      <line x1="-38" y1="0" x2="-30" y2="0"/><line x1="-27" y1="-27" x2="-21" y2="-21"/>
    </g>
    <text y="56" text-anchor="middle" font-size="12.5" class="honey">the sun</text>
  </g>

  <!-- figure-eight dance path -->
  <g fill="none" stroke="#e2c78e" stroke-width="2.5" stroke-linecap="round">
    <path d="M470 210 C 330 150, 250 300, 330 380 C 400 448, 452 400, 452 400"/>
    <path d="M470 210 C 610 150, 690 300, 610 380 C 540 448, 452 400, 452 400"/>
  </g>

  <!-- vertical reference + angle -->
  <line x1="461" y1="402" x2="461" y2="216" stroke="#c9c9c4" stroke-width="1.5" stroke-dasharray="4 5"/>
  <path d="M461 250 A 40 40 0 0 1 474 232" fill="none" stroke="#9b9ca1" stroke-width="1.5"/>
  <text x="486" y="248" font-size="14" class="muted">θ</text>

  <!-- the waggle run: straight middle, angled to vertical = direction -->
  <line x1="452" y1="402" x2="470" y2="214" stroke="#b8791a" stroke-width="5" stroke-linecap="round" marker-end="url(#run)"/>

  <!-- the dancing bee, riding the run -->
  <g transform="translate(461 306) rotate(-6)">
    <ellipse cx="-8" cy="-16" rx="10" ry="21" fill="#ffffff" stroke="#d3d3ce" stroke-width="1.2" transform="rotate(-28 -8 -16)"/>
    <ellipse cx="8"  cy="-16" rx="10" ry="21" fill="#ffffff" stroke="#d3d3ce" stroke-width="1.2" transform="rotate(28 8 -16)"/>
    <ellipse cx="0" cy="14" rx="14" ry="26" fill="#b8791a" stroke="#8a5a12" stroke-width="1.4"/>
    <path d="M-12 6  q 12 6 24 0" fill="none" stroke="#141414" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M-13 18 q 13 6 26 0" fill="none" stroke="#141414" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M-11 30 q 11 5 22 0" fill="none" stroke="#141414" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="0" cy="-8" rx="11" ry="12" fill="#3a2a0e"/>
    <circle cx="0" cy="-24" r="7.5" fill="#141414"/>
    <path d="M-3 -30 q -7 -8 -11 -6" fill="none" stroke="#141414" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M3 -30 q 7 -8 11 -6" fill="none" stroke="#141414" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- follower bees: each flies the reference herself -->
  <g>
    <g transform="translate(250 472) rotate(20)"><ellipse rx="6" ry="10" fill="#b8791a" stroke="#8a5a12" stroke-width="0.9"/><circle cy="-11" r="3.5" fill="#141414"/><path d="M-6 -1 q6 3 12 0 M-6 4 q6 3 12 0" fill="none" stroke="#141414" stroke-width="1.6"/></g>
    <g transform="translate(662 482) rotate(-24)"><ellipse rx="6" ry="10" fill="#b8791a" stroke="#8a5a12" stroke-width="0.9"/><circle cy="-11" r="3.5" fill="#141414"/><path d="M-6 -1 q6 3 12 0 M-6 4 q6 3 12 0" fill="none" stroke="#141414" stroke-width="1.6"/></g>
    <g transform="translate(360 524) rotate(6)"><ellipse rx="5" ry="8.5" fill="#b8791a" stroke="#8a5a12" stroke-width="0.9"/><circle cy="-9.5" r="3" fill="#141414"/></g>
  </g>
  <path d="M300 454 C 360 422, 420 402, 452 390" fill="none" stroke="#d9be82" stroke-width="1.5" stroke-dasharray="1.5 8" stroke-linecap="round"/>
  <path d="M612 464 C 552 426, 492 402, 458 390" fill="none" stroke="#d9be82" stroke-width="1.5" stroke-dasharray="1.5 8" stroke-linecap="round"/>

  <!-- labels -->
  <g font-size="13.5">
    <text x="300" y="214" text-anchor="end" class="ink">angle</text>
    <text x="300" y="232" text-anchor="end" font-size="11.5" class="muted">→ direction</text>
    <line x1="306" y1="220" x2="356" y2="244" stroke="#d3d3ce" stroke-width="1.2"/>

    <text x="616" y="214" class="ink">duration</text>
    <text x="616" y="232" font-size="11.5" class="muted">→ distance</text>
    <line x1="610" y1="220" x2="562" y2="244" stroke="#d3d3ce" stroke-width="1.2"/>

    <text x="452" y="476" text-anchor="middle" class="ink">vigor <tspan class="muted">→ quality</tspan></text>
  </g>
</svg>
