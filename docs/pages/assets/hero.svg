<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace">
  <style>
    text { font-family: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace; }
    .ink{fill:#141414} .soft{fill:#2e2f34} .muted{fill:#6a6b70} .faint{fill:#9b9ca1}
    .honey{fill:#b8791a} .green{fill:#1f7a3f} .red{fill:#b23b30}
    .b{font-weight:600}
  </style>

  <rect x="0" y="0" width="1120" height="560" fill="#ffffff"/>

  <!-- ===== source artifact (left) ===== -->
  <rect x="70" y="156" width="150" height="196" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <rect x="90" y="180" width="76"  height="9" rx="2" fill="#b8791a"/>
  <rect x="90" y="198" width="110" height="6" rx="3" fill="#e2e2de"/>
  <rect x="90" y="210" width="96"  height="6" rx="3" fill="#e2e2de"/>
  <rect x="90" y="222" width="108" height="6" rx="3" fill="#e2e2de"/>
  <rect x="90" y="242" width="58"  height="9" rx="2" fill="#b8791a"/>
  <rect x="90" y="260" width="104" height="6" rx="3" fill="#e2e2de"/>
  <rect x="90" y="272" width="88"  height="6" rx="3" fill="#e2e2de"/>
  <rect x="90" y="284" width="106" height="6" rx="3" fill="#e2e2de"/>
  <rect x="126" y="312" width="64" height="24" rx="3" fill="#b8791a"/>
  <text x="158" y="328" text-anchor="middle" font-size="11" fill="#ffffff" class="b">MINT</text>
  <text x="145" y="374" text-anchor="middle" font-size="13" class="muted">the artifact</text>

  <!-- connector artifact -> token -->
  <path d="M220 258 C 300 258, 330 274, 393 276" fill="none" stroke="#b8791a" stroke-width="2" stroke-dasharray="1.5 6" stroke-linecap="round" opacity="0.65"/>

  <!-- ===== the token ===== -->
  <rect x="395" y="256" width="150" height="46" rx="5" fill="#b8791a"/>
  <text x="470" y="285" text-anchor="middle" font-size="16" fill="#ffffff" class="b">b2uQyZUC</text>
  <text x="470" y="328" text-anchor="middle" font-size="13" class="muted">a ~30-byte name</text>

  <!-- threads token -> projections -->
  <g fill="none" stroke="#b8791a" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M547 274 C 630 200, 680 120, 718 112"/>
    <path d="M549 278 C 630 250, 680 232, 718 228"/>
    <path d="M549 282 C 630 320, 680 340, 718 344"/>
    <path d="M547 286 C 630 400, 680 456, 718 460"/>
  </g>

  <!-- ===== four projections (right) ===== -->
  <!-- 1 · digest -->
  <rect x="720" y="70" width="330" height="84" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="738" y="96" font-size="13" class="honey b">claude · digest</text>
  <rect x="738" y="108" width="200" height="6" rx="3" fill="#e2e2de"/>
  <rect x="738" y="120" width="288" height="6" rx="3" fill="#e2e2de"/>
  <rect x="738" y="132" width="150" height="6" rx="3" fill="#e2e2de"/>

  <!-- 2 · image -->
  <rect x="720" y="186" width="330" height="84" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="738" y="212" font-size="13" class="green b">vision · image</text>
  <rect x="738" y="224" width="60" height="32" rx="3" fill="#eef6f0" stroke="#cfe3d6" stroke-width="1.3"/>
  <circle cx="753" cy="236" r="4" fill="#8bbf8b"/>
  <path d="M744 250 l 12 -12 l 8 8 l 6 -5 l 8 7" fill="none" stroke="#3a7d44" stroke-width="1.6"/>
  <text x="814" y="245" font-size="13" class="muted">the chart, delivered</text>

  <!-- 3 · transcript -->
  <rect x="720" y="302" width="330" height="84" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="738" y="328" font-size="13" class="honey b">no ears · transcript</text>
  <path d="M738 356 q 5 -14 10 0 t 10 0 t 10 0 t 10 0 t 10 0" fill="none" stroke="#b8791a" stroke-width="1.8"/>
  <text x="808" y="361" font-size="13" class="muted">→ text you can read</text>

  <!-- 4 · fail-closed -->
  <rect x="720" y="418" width="330" height="84" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="738" y="444" font-size="13" class="red b">ci · fail-closed</text>
  <rect x="738" y="456" width="20" height="17" rx="2.5" fill="#fbefed" stroke="#b23b30" stroke-width="1.4"/>
  <path d="M742 456 v-4 a6 6 0 0 1 12 0 v4" fill="none" stroke="#b23b30" stroke-width="1.4"/>
  <text x="770" y="470" font-size="13" class="muted">no human? then no writes</text>

  <!-- caption -->
  <text x="560" y="536" text-anchor="middle" font-size="15" class="muted">one name travels — each consumer resolves its <tspan class="honey b">own</tspan> truthful rendering, where the bytes live</text>
</svg>
