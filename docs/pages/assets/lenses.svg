<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <radialGradient id="xwarm" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#fffefb"/><stop offset="70%" stop-color="#fdf7ea"/><stop offset="100%" stop-color="#f3e8cf"/>
    </radialGradient>
    <linearGradient id="xgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4cf78"/><stop offset="100%" stop-color="#c9860a"/>
    </linearGradient>
    <linearGradient id="xred" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e79a8f"/><stop offset="100%" stop-color="#b3423a"/>
    </linearGradient>
    <filter id="xdrop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#6b4e15" flood-opacity="0.15"/>
    </filter>
    <marker id="xgo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b98a2e"/>
    </marker>
    <pattern id="xcomb" width="52" height="45" patternUnits="userSpaceOnUse">
      <path d="M13 0 L39 0 L52 22.5 L39 45 L13 45 L0 22.5 Z" fill="none" stroke="#e8d9b4" stroke-width="1" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1000" height="470" fill="url(#xwarm)"/>
  <rect width="1000" height="470" fill="url(#xcomb)" opacity="0.5"/>

  <text x="500" y="52" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="26" font-weight="600" fill="#241d12">One token, the right lens for each artifact</text>
  <text x="500" y="76" text-anchor="middle" font-size="12.5" fill="#8a7a58">structure is discovered from the content type &#8212; the loop you learn on a report works on a lockfile</text>

  <!-- ===== Panel 1: prose (center 170) ===== -->
  <g>
    <text x="170" y="120" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#5a6472">prose &#183; .md .txt</text>
    <g filter="url(#xdrop)">
      <rect x="105" y="134" width="130" height="90" rx="8" fill="#ffffff" stroke="#e2dac9"/>
    </g>
    <rect x="122" y="152" width="70" height="8" rx="4" fill="#c9860a"/>
    <rect x="122" y="168" width="96" height="5" rx="2.5" fill="#e0e2e7"/>
    <rect x="122" y="180" width="84" height="5" rx="2.5" fill="#e0e2e7"/>
    <rect x="122" y="196" width="52" height="8" rx="4" fill="#c9860a"/>
    <rect x="122" y="210" width="90" height="5" rx="2.5" fill="#e0e2e7"/>
    <line x1="170" y1="224" x2="170" y2="246" stroke="#b98a2e" stroke-width="2" marker-end="url(#xgo)"/>
    <rect x="92" y="248" width="156" height="38" rx="10" fill="url(#xgold)" stroke="#8a5a08" stroke-width="1.2" filter="url(#xdrop)"/>
    <text x="170" y="272" text-anchor="middle" font-size="12.5" fill="#2e1e04" font-weight="600">mint --snapshot</text>
    <line x1="170" y1="286" x2="170" y2="306" stroke="#b98a2e" stroke-width="2" marker-end="url(#xgo)"/>
    <text x="170" y="324" text-anchor="middle" font-size="11" fill="#8a7a58">the lenses it affords</text>
    <text x="170" y="346" text-anchor="middle" font-size="13" fill="#2c5134">outline &#183; section &#183; lines</text>
    <text x="170" y="366" text-anchor="middle" font-size="13" fill="#2c5134">search</text>
  </g>

  <!-- ===== Panel 2: code (center 500) ===== -->
  <g>
    <text x="500" y="120" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#5a6472">code &#183; .rs .py .ts .go</text>
    <g filter="url(#xdrop)">
      <rect x="435" y="134" width="130" height="90" rx="8" fill="#ffffff" stroke="#e2dac9"/>
    </g>
    <text x="449" y="157" font-size="11" fill="#3a7d44">fn</text><rect x="471" y="149" width="50" height="6" rx="3" fill="#dfe1e6"/>
    <text x="461" y="175" font-size="11" fill="#adb2bb">&#183;</text><rect x="471" y="167" width="72" height="5" rx="2.5" fill="#eceef1"/>
    <text x="449" y="195" font-size="11" fill="#3a7d44">impl</text><rect x="485" y="187" width="40" height="6" rx="3" fill="#dfe1e6"/>
    <text x="461" y="213" font-size="11" fill="#adb2bb">&#183;</text><rect x="471" y="205" width="64" height="5" rx="2.5" fill="#eceef1"/>
    <line x1="500" y1="224" x2="500" y2="246" stroke="#b98a2e" stroke-width="2" marker-end="url(#xgo)"/>
    <rect x="422" y="248" width="156" height="38" rx="10" fill="url(#xgold)" stroke="#8a5a08" stroke-width="1.2" filter="url(#xdrop)"/>
    <text x="500" y="272" text-anchor="middle" font-size="12.5" fill="#2e1e04" font-weight="600">mint --snapshot</text>
    <line x1="500" y1="286" x2="500" y2="306" stroke="#b98a2e" stroke-width="2" marker-end="url(#xgo)"/>
    <text x="500" y="324" text-anchor="middle" font-size="11" fill="#8a7a58">a symbol outline, extracted at mint</text>
    <text x="500" y="346" text-anchor="middle" font-size="13" fill="#2c5134">symbol &#183; lines &#183; search</text>
    <text x="500" y="366" text-anchor="middle" font-size="13" fill="#2c5134">--require symbol:NAME</text>
  </g>

  <!-- ===== Panel 3: binary (center 830) ===== -->
  <g>
    <text x="830" y="120" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#5a6472">binary &#183; pdf image voice</text>
    <g filter="url(#xdrop)">
      <rect x="765" y="134" width="130" height="90" rx="8" fill="#ffffff" stroke="#e2dac9"/>
    </g>
    <text x="830" y="166" text-anchor="middle" font-size="11" fill="#8a7a58">opaque bytes</text>
    <path d="M781 194 q 10 -24 20 0 t 20 0 t 20 0 t 20 0 t 20 0" fill="none" stroke="#b3423a" stroke-width="2"/>
    <line x1="830" y1="224" x2="830" y2="246" stroke="#b98a2e" stroke-width="2" marker-end="url(#xgo)"/>
    <rect x="752" y="248" width="156" height="38" rx="10" fill="url(#xred)" stroke="#7a2d27" stroke-width="1.1" filter="url(#xdrop)"/>
    <text x="830" y="266" text-anchor="middle" font-size="11.5" fill="#fbeeec">text via --content</text>
    <text x="830" y="280" text-anchor="middle" font-size="11.5" fill="#fbeeec">media via --attach</text>
    <line x1="830" y1="286" x2="830" y2="306" stroke="#b98a2e" stroke-width="2" marker-end="url(#xgo)"/>
    <text x="830" y="324" text-anchor="middle" font-size="11" fill="#8a7a58">then it reads like text</text>
    <text x="830" y="346" text-anchor="middle" font-size="13" fill="#2c5134">lines &#183; search</text>
    <text x="830" y="366" text-anchor="middle" font-size="11.5" fill="#2c5134">media &#8594; vision/voice consumers</text>
  </g>

  <text x="500" y="418" text-anchor="middle" font-size="12.5" fill="#7a6a48">every response fits a byte budget and names the bytes it spared you</text>
</svg>
