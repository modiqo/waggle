<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace">
  <style>
    text { font-family: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace; }
    .ink{fill:#141414} .muted{fill:#6a6b70} .faint{fill:#9b9ca1}
    .red{fill:#b23b30} .honey{fill:#8a5a12} .green{fill:#1f7a3f}
    .b{font-weight:600}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#b8791a" stroke-width="1.6"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#b23b30" stroke-width="1.6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="470" fill="#ffffff"/>

  <text x="48" y="52" font-size="28" class="ink b" letter-spacing="-0.5">The author's loop</text>
  <text x="48" y="84" font-size="15" class="muted">every step lands as a payload-free event — the log is the truth, the funnel is a fold</text>

  <!-- ===== five stations ===== -->
  <!-- mint -->
  <rect x="48" y="116" width="176" height="76" rx="5" fill="#faf3e6" stroke="#b8791a" stroke-width="1.5"/>
  <text x="136" y="152" text-anchor="middle" font-size="15" class="honey b">mint</text>
  <text x="136" y="172" text-anchor="middle" font-size="11" fill="#a07a2e">an attributed name</text>
  <!-- hand off -->
  <rect x="280" y="116" width="176" height="76" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="368" y="152" text-anchor="middle" font-size="15" class="ink b">hand off</text>
  <text x="368" y="172" text-anchor="middle" font-size="11" class="muted">one 30-byte line</text>
  <!-- resolve -->
  <rect x="512" y="116" width="176" height="76" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="600" y="152" text-anchor="middle" font-size="15" class="ink b">resolve</text>
  <text x="600" y="172" text-anchor="middle" font-size="11" class="muted">its own projection</text>
  <!-- interrogate -->
  <rect x="744" y="116" width="176" height="76" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <text x="832" y="152" text-anchor="middle" font-size="15" class="ink b">interrogate</text>
  <text x="832" y="172" text-anchor="middle" font-size="11" class="muted">read · search</text>
  <!-- funnel -->
  <rect x="976" y="116" width="176" height="76" rx="5" fill="#eef6f0" stroke="#1f7a3f" stroke-width="1.5"/>
  <text x="1064" y="152" text-anchor="middle" font-size="15" class="green b">funnel</text>
  <text x="1064" y="172" text-anchor="middle" font-size="11" fill="#3a7d44">receipts</text>

  <!-- flow arrows (contained in the gaps) -->
  <g stroke="#b8791a" stroke-width="2">
    <line x1="232" y1="154" x2="272" y2="154" marker-end="url(#ar)"/>
    <line x1="464" y1="154" x2="504" y2="154" marker-end="url(#ar)"/>
    <line x1="696" y1="154" x2="736" y2="154" marker-end="url(#ar)"/>
    <line x1="928" y1="154" x2="968" y2="154" marker-end="url(#ar)"/>
  </g>

  <!-- ===== the log ribbon ===== -->
  <text x="48" y="286" font-size="13" class="muted">the append-only log · payload-free</text>
  <rect x="48" y="298" width="1104" height="58" rx="5" fill="#f6f6f4" stroke="#e6e6e2" stroke-width="1.5"/>

  <!-- connectors from stations down to their events -->
  <g stroke="#d3d3ce" stroke-width="1.4" stroke-dasharray="1.5 5">
    <line x1="136"  y1="192" x2="136"  y2="298"/>
    <line x1="600"  y1="192" x2="600"  y2="298"/>
    <line x1="832"  y1="192" x2="832"  y2="298"/>
    <line x1="1064" y1="192" x2="1064" y2="298"/>
  </g>

  <!-- events -->
  <g font-size="11" class="muted" text-anchor="middle">
    <circle cx="136" cy="325" r="6" fill="#ffffff" stroke="#b8791a" stroke-width="1.5"/>
    <text x="136" y="348" class="honey">minted</text>
    <circle cx="600" cy="325" r="6" fill="#ffffff" stroke="#b8791a" stroke-width="1.5"/>
    <text x="600" y="348" class="honey">resolve</text>
    <circle cx="800" cy="325" r="6" fill="#ffffff" stroke="#b8791a" stroke-width="1.5"/>
    <text x="800" y="348" class="honey">read</text>
    <circle cx="864" cy="325" r="6" fill="#ffffff" stroke="#b8791a" stroke-width="1.5"/>
    <text x="864" y="348" class="honey">run</text>
    <line x1="1040" y1="325" x2="1088" y2="325" stroke="#1f7a3f" stroke-width="2"/>
    <text x="1064" y="348" class="green b">fold</text>
  </g>

  <!-- ===== correction lane (its own row, no overlap) ===== -->
  <line x1="136" y1="404" x2="1058" y2="404" stroke="#b23b30" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#arR)" opacity="0.9"/>
  <text x="597" y="440" text-anchor="middle" font-size="13" class="red">one revoke — a correction reaches every holder <tspan class="b">(caches answer 410)</tspan></text>
</svg>
