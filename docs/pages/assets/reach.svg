<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <radialGradient id="rwarm" cx="18%" cy="50%" r="95%">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="66%" stop-color="#fdf7ea"/>
      <stop offset="100%" stop-color="#f3e8cf"/>
    </radialGradient>
    <linearGradient id="rgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4cf78"/><stop offset="100%" stop-color="#c9860a"/>
    </linearGradient>
    <linearGradient id="rthread" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9860a"/><stop offset="100%" stop-color="#e6b34f" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="rdrop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#6b4e15" flood-opacity="0.16"/>
    </filter>
    <marker id="rgo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c9860a"/>
    </marker>
    <pattern id="rcomb" width="52" height="45" patternUnits="userSpaceOnUse">
      <path d="M13 0 L39 0 L52 22.5 L39 45 L13 45 L0 22.5 Z" fill="none" stroke="#e8d9b4" stroke-width="1" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1000" height="500" fill="url(#rwarm)"/>
  <rect width="1000" height="500" fill="url(#rcomb)" opacity="0.5"/>

  <text x="52" y="58" font-family="Fraunces, Georgia, serif" font-size="26" font-weight="600" fill="#241d12">One token, three radii</text>
  <text x="54" y="84" font-size="12.5" fill="#8a7a58">the verb loop is identical &#8212; only the transport lengthens</text>

  <!-- expanding shells, centered on the origin machine (150,300) -->
  <g fill="none" stroke-linecap="round">
    <path d="M150 118 A 182 182 0 0 1 150 482" stroke="#e2c98a" stroke-width="2" stroke-dasharray="3 7"/>
    <path d="M150 70  A 348 230 0 0 1 150 530" stroke="#d9bd78" stroke-width="2" stroke-dasharray="3 7" opacity="0.8"/>
    <path d="M150 30  A 520 270 0 0 1 150 570" stroke="#cdae63" stroke-width="2" stroke-dasharray="3 7" opacity="0.6"/>
  </g>
  <g font-size="12.5" fill="#8a6a1e">
    <text x="300" y="150">&#9312; one machine</text>
    <text x="470" y="118">&#9313; across machines</text>
    <text x="638" y="92">&#9314; the edge</text>
  </g>

  <!-- origin machine: harnesses -> one daemon -->
  <g filter="url(#rdrop)">
    <rect x="70" y="222" width="160" height="150" rx="12" fill="#ffffff" stroke="#e2dac9"/>
  </g>
  <text x="150" y="245" text-anchor="middle" font-size="11.5" fill="#8a7a58">one machine</text>
  <g font-size="11" fill="#1f2430">
    <rect x="84" y="256" width="60" height="20" rx="5" fill="#fdf7ea" stroke="#e2dac9"/><text x="114" y="270" text-anchor="middle" font-size="9.5">claude code</text>
    <rect x="84" y="282" width="60" height="20" rx="5" fill="#fdf7ea" stroke="#e2dac9"/><text x="114" y="296" text-anchor="middle" font-size="9.5">codex</text>
    <rect x="84" y="308" width="60" height="20" rx="5" fill="#fdf7ea" stroke="#e2dac9"/><text x="114" y="322" text-anchor="middle" font-size="9.5">cursor</text>
  </g>
  <rect x="158" y="278" width="64" height="34" rx="8" fill="url(#rgold)" stroke="#8a5a08" stroke-width="1.1"/>
  <text x="190" y="299" text-anchor="middle" font-size="10.5" fill="#2e1e04" font-weight="600">waggled</text>
  <g stroke="#c9860a" stroke-width="1.6">
    <line x1="144" y1="266" x2="158" y2="288" marker-end="url(#rgo)"/>
    <line x1="144" y1="292" x2="158" y2="295" marker-end="url(#rgo)"/>
    <line x1="144" y1="318" x2="158" y2="302" marker-end="url(#rgo)"/>
  </g>

  <!-- second machine (federation) -->
  <g filter="url(#rdrop)">
    <rect x="452" y="250" width="120" height="66" rx="12" fill="#ffffff" stroke="#e2dac9"/>
  </g>
  <rect x="470" y="268" width="64" height="30" rx="7" fill="url(#rgold)" stroke="#8a5a08" stroke-width="1.1"/>
  <text x="502" y="287" text-anchor="middle" font-size="10" fill="#2e1e04" font-weight="600">waggled</text>
  <text x="512" y="245" text-anchor="middle" font-size="10.5" fill="#8a7a58">another machine</text>
  <path d="M230 296 C 330 296, 360 283, 452 283" fill="none" stroke="url(#rthread)" stroke-width="2.6" marker-end="url(#rgo)"/>
  <text x="340" y="276" text-anchor="middle" font-size="10.5" fill="#a3872f">federation</text>

  <!-- the edge: a globe where grep runs -->
  <g transform="translate(812 288)" filter="url(#rdrop)">
    <circle r="62" fill="#fbfaf6" stroke="#d9c9a4"/>
    <ellipse rx="62" ry="24" fill="none" stroke="#dcc9a0" stroke-width="1"/>
    <ellipse rx="40" ry="62" fill="none" stroke="#dcc9a0" stroke-width="1"/>
    <ellipse rx="20" ry="62" fill="none" stroke="#dcc9a0" stroke-width="1"/>
    <line x1="-62" y1="0" x2="62" y2="0" stroke="#dcc9a0" stroke-width="1"/>
    <!-- grep magnifier -->
    <g transform="translate(16 8)">
      <circle r="15" fill="#fdf3dd" stroke="#c9860a" stroke-width="2"/>
      <line x1="11" y1="11" x2="24" y2="24" stroke="#c9860a" stroke-width="3.5" stroke-linecap="round"/>
      <text y="4" text-anchor="middle" font-size="9" fill="#8a6a1e">grep</text>
    </g>
  </g>
  <text x="812" y="368" text-anchor="middle" font-size="11.5" fill="#8a7a58">the edge</text>
  <path d="M572 283 C 660 283, 690 288, 752 288" fill="none" stroke="url(#rthread)" stroke-width="2.6" marker-end="url(#rgo)"/>
  <text x="662" y="272" text-anchor="middle" font-size="10.5" fill="#a3872f">log replay</text>

  <!-- source-never-leaves seal -->
  <g transform="translate(150 430)">
    <rect x="-84" y="-16" width="230" height="34" rx="17" fill="#eef4ee" stroke="#bcd2bc"/>
    <text x="30" y="5" text-anchor="middle" font-size="11.5" fill="#2c5134">the source files never leave your laptop</text>
  </g>

  <text x="812" y="452" text-anchor="middle" font-size="11.5" fill="#a3872f">matches travel back &#8212; the bytes stay put</text>
</svg>
