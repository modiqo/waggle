<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" width="1120" height="520" font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace">
  <style>
    text { font-family: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace; }
    .ink{fill:#141414} .soft{fill:#2e2f34} .muted{fill:#6a6b70} .faint{fill:#9b9ca1}
    .honey{fill:#b8791a} .green{fill:#1f7a3f}
    .b{font-weight:600}
  </style>
  <defs>
    <marker id="rg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#b8791a" stroke-width="1.6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1120" height="520" fill="#ffffff"/>

  <text x="48" y="52" font-size="26" class="ink b" letter-spacing="-0.5">One token, three radii</text>
  <text x="48" y="82" font-size="15" class="muted">the verb loop is identical — only the transport lengthens</text>

  <!-- zone dividers -->
  <g stroke="#e2e2de" stroke-width="1.5" stroke-dasharray="2 6">
    <line x1="400" y1="108" x2="400" y2="474"/>
    <line x1="740" y1="108" x2="740" y2="474"/>
  </g>
  <g font-size="13" class="honey">
    <text x="70"  y="132">① one machine</text>
    <text x="424" y="132">② across machines</text>
    <text x="762" y="132">③ the edge</text>
  </g>

  <!-- ===== zone 1 : origin machine ===== -->
  <rect x="90" y="250" width="172" height="150" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <g font-size="9.5">
    <rect x="106" y="278" width="66" height="22" rx="3" fill="#f6f6f4" stroke="#e6e6e2" stroke-width="1.2"/><text x="139" y="292" text-anchor="middle" class="soft">claude code</text>
    <rect x="106" y="306" width="66" height="22" rx="3" fill="#f6f6f4" stroke="#e6e6e2" stroke-width="1.2"/><text x="139" y="320" text-anchor="middle" class="soft">codex</text>
    <rect x="106" y="334" width="66" height="22" rx="3" fill="#f6f6f4" stroke="#e6e6e2" stroke-width="1.2"/><text x="139" y="348" text-anchor="middle" class="soft">cursor</text>
  </g>
  <rect x="184" y="300" width="66" height="34" rx="4" fill="#b8791a"/>
  <text x="217" y="322" text-anchor="middle" font-size="11" fill="#ffffff" class="b">waggled</text>
  <g stroke="#b8791a" stroke-width="1.6">
    <line x1="172" y1="289" x2="182" y2="311" marker-end="url(#rg)"/>
    <line x1="172" y1="317" x2="182" y2="317" marker-end="url(#rg)"/>
    <line x1="172" y1="345" x2="182" y2="323" marker-end="url(#rg)"/>
  </g>
  <text x="176" y="422" text-anchor="middle" font-size="12" class="muted">harnesses → one daemon</text>

  <!-- ===== zone 2 : another machine ===== -->
  <text x="553" y="278" text-anchor="middle" font-size="12" class="muted">another machine</text>
  <rect x="478" y="286" width="150" height="78" rx="5" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.5"/>
  <rect x="506" y="302" width="94" height="34" rx="4" fill="#b8791a"/>
  <text x="553" y="324" text-anchor="middle" font-size="11" fill="#ffffff" class="b">waggled</text>
  <path d="M250 318 C 360 318, 380 325, 476 325" fill="none" stroke="#b8791a" stroke-width="2" marker-end="url(#rg)"/>
  <text x="363" y="308" text-anchor="middle" font-size="12" class="honey">federation</text>

  <!-- ===== zone 3 : the edge ===== -->
  <g transform="translate(900 322)">
    <circle r="58" fill="#fbfbf9" stroke="#d3d3ce" stroke-width="1.5"/>
    <ellipse rx="58" ry="22" fill="none" stroke="#e2e2de" stroke-width="1"/>
    <ellipse rx="38" ry="58" fill="none" stroke="#e2e2de" stroke-width="1"/>
    <ellipse rx="18" ry="58" fill="none" stroke="#e2e2de" stroke-width="1"/>
    <line x1="-58" y1="0" x2="58" y2="0" stroke="#e2e2de" stroke-width="1"/>
    <g transform="translate(14 8)">
      <circle r="15" fill="#faf3e6" stroke="#b8791a" stroke-width="2"/>
      <line x1="11" y1="11" x2="24" y2="24" stroke="#b8791a" stroke-width="3.5" stroke-linecap="round"/>
      <text y="4" text-anchor="middle" font-size="9" class="honey b">grep</text>
    </g>
  </g>
  <text x="900" y="410" text-anchor="middle" font-size="12" class="muted">the edge</text>
  <path d="M628 322 C 720 322, 748 322, 838 322" fill="none" stroke="#b8791a" stroke-width="2" marker-end="url(#rg)"/>
  <text x="735" y="308" text-anchor="middle" font-size="12" class="honey">log replay</text>

  <!-- seals -->
  <rect x="70" y="446" width="300" height="32" rx="4" fill="#eef6f0" stroke="#cfe3d6" stroke-width="1.3"/>
  <text x="220" y="467" text-anchor="middle" font-size="11.5" class="green">the source files never leave your laptop</text>
  <text x="900" y="466" text-anchor="middle" font-size="12" class="honey">matches travel back — the bytes stay put</text>
</svg>
