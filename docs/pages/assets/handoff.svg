<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 316" width="1200" height="316" font-family="'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace">
  <style>
    text { font-family: 'IBM Plex Mono', ui-monospace, Menlo, Consolas, monospace; }
    .ink{fill:#141414} .soft{fill:#2e2f34} .muted{fill:#6a6b70} .faint{fill:#9b9ca1}
    .honey{fill:#b8791a} .green{fill:#1f7a3f} .b{font-weight:600}

    /* loop = 10s. work flows down (honey), verification converges back up (green). */
    .flow  { offset-path: path('M 336 143 L 864 143'); offset-rotate:0deg; animation: flow 10s cubic-bezier(.45,0,.55,1) infinite; }
    .cvB   { offset-path: path('M 902 190 C 860 252 742 252 696 192'); offset-rotate:0deg; animation: cvB 10s ease-in-out infinite; }
    .cvA   { offset-path: path('M 512 190 C 470 252 350 252 306 192'); offset-rotate:0deg; animation: cvA 10s ease-in-out infinite; }
    @keyframes flow {
      0%{offset-distance:0%;opacity:0} 4%{opacity:1}
      12%{offset-distance:13%} 18%{offset-distance:13%;opacity:1}
      30%{opacity:.1}
      44%{offset-distance:50%;opacity:.1} 50%{offset-distance:50%;opacity:.1}
      64%{opacity:1}
      82%{offset-distance:87%;opacity:1} 87%{offset-distance:87%}
      98%{offset-distance:100%;opacity:1} 100%{opacity:0} }
    @keyframes cvB { 0%,54%{offset-distance:0%;opacity:0} 57%{opacity:1} 70%{offset-distance:100%;opacity:1} 73%{opacity:0} 100%{opacity:0} }
    @keyframes cvA { 0%,72%{offset-distance:0%;opacity:0} 75%{opacity:1} 88%{offset-distance:100%;opacity:1} 91%{opacity:0} 100%{opacity:0} }
    @media (prefers-reduced-motion: reduce){ .flow,.cvB,.cvA{ animation:none; opacity:0 } }
  </style>
  <defs>
    <marker id="rg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#b8791a" stroke-width="1.6"/></marker>
    <marker id="vg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#1f7a3f" stroke-width="1.6"/></marker>
  </defs>

  <rect x="0" y="0" width="1200" height="316" fill="#ffffff"/>

  <!-- ===== STAGE 1 · FABLE · plan ===== -->
  <rect x="164" y="40" width="92" height="26" rx="13" fill="#faf3e6" stroke="#b8791a" stroke-width="1.4"/>
  <text x="210" y="57" text-anchor="middle" font-size="13" class="honey b">Fable</text>
  <text x="210" y="86" text-anchor="middle" font-size="11.5" class="muted">orchestrator</text>
  <rect x="84" y="96" width="252" height="94" rx="8" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.6"/>
  <rect x="86" y="98" width="4" height="90" rx="2" fill="#b8791a"/>
  <text x="212" y="138" text-anchor="middle" font-size="16" class="ink b">plan</text>
  <text x="212" y="164" text-anchor="middle" font-size="12" class="muted">a folder of plans</text>

  <!-- handoff 1 -->
  <g stroke="#e3d3ac" stroke-width="2" fill="none">
    <line x1="336" y1="143" x2="376" y2="143" marker-end="url(#rg)"/>
    <line x1="434" y1="143" x2="474" y2="143" marker-end="url(#rg)"/></g>
  <text x="405" y="116" text-anchor="middle" font-size="11" class="honey">mint &#183; hand off</text>
  <rect x="378" y="130" width="54" height="26" rx="6" fill="#b8791a"/>
  <text x="405" y="148" text-anchor="middle" font-size="14" fill="#ffffff">&#9671;</text>
  <text x="405" y="176" text-anchor="middle" font-size="10" class="faint">the plans</text>

  <!-- ===== STAGE 2 · OPUS · build ===== -->
  <rect x="554" y="40" width="92" height="26" rx="13" fill="#f2f2f0" stroke="#c9c9c4" stroke-width="1.4"/>
  <text x="600" y="57" text-anchor="middle" font-size="13" class="ink b">Opus</text>
  <text x="600" y="86" text-anchor="middle" font-size="11.5" class="muted">sub-agent &#183; build</text>
  <rect x="474" y="96" width="252" height="94" rx="8" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.6"/>
  <rect x="476" y="98" width="4" height="90" rx="2" fill="#2e2f34"/>
  <text x="606" y="132" text-anchor="middle" font-size="15" class="ink b">resolve &#183; review</text>
  <text x="606" y="156" text-anchor="middle" font-size="12" class="muted">then implement</text>
  <text x="606" y="179" text-anchor="middle" font-size="10.5" class="green">search the projection &#183; lens</text>

  <!-- handoff 2 -->
  <g stroke="#e3d3ac" stroke-width="2" fill="none">
    <line x1="726" y1="143" x2="766" y2="143" marker-end="url(#rg)"/>
    <line x1="824" y1="143" x2="864" y2="143" marker-end="url(#rg)"/></g>
  <text x="795" y="116" text-anchor="middle" font-size="11" class="honey">mint &#183; hand off</text>
  <rect x="768" y="130" width="54" height="26" rx="6" fill="#b8791a"/>
  <text x="795" y="148" text-anchor="middle" font-size="14" fill="#ffffff">&#9671;</text>
  <text x="795" y="176" text-anchor="middle" font-size="10" class="faint">the build</text>

  <!-- ===== STAGE 3 · SONNET · test ===== -->
  <rect x="944" y="40" width="92" height="26" rx="13" fill="#eef6f0" stroke="#1f7a3f" stroke-width="1.4"/>
  <text x="990" y="57" text-anchor="middle" font-size="13" class="green b">Sonnet</text>
  <text x="990" y="86" text-anchor="middle" font-size="11.5" class="muted">sub-agent &#183; test</text>
  <rect x="864" y="96" width="252" height="94" rx="8" fill="#ffffff" stroke="#e6e6e2" stroke-width="1.6"/>
  <rect x="866" y="98" width="4" height="90" rx="2" fill="#1f7a3f"/>
  <text x="992" y="138" text-anchor="middle" font-size="16" class="ink b">write</text>
  <text x="992" y="164" text-anchor="middle" font-size="12" class="muted">test-stubs</text>

  <!-- ===== CONVERGE · verification returns up the chain ===== -->
  <path d="M 902 190 C 860 252 742 252 696 192" fill="none" stroke="#1f7a3f" stroke-width="1.8" stroke-dasharray="1 7" stroke-linecap="round" marker-end="url(#vg)"/>
  <path d="M 512 190 C 470 252 350 252 306 192" fill="none" stroke="#1f7a3f" stroke-width="1.8" stroke-dasharray="1 7" stroke-linecap="round" marker-end="url(#vg)"/>
  <g>
    <rect x="763" y="238" width="66" height="26" rx="8" fill="#eef6f0" stroke="#1f7a3f" stroke-width="1.4"/>
    <text x="796" y="255" text-anchor="middle" font-size="12.5" class="green b">&#10003; met</text>
  </g>
  <g>
    <rect x="376" y="238" width="66" height="26" rx="8" fill="#eef6f0" stroke="#1f7a3f" stroke-width="1.4"/>
    <text x="409" y="255" text-anchor="middle" font-size="12.5" class="green b">&#10003; met</text>
  </g>
  <text x="600" y="298" text-anchor="middle" font-size="11" class="muted">converge &#8212; each model verifies its sub-agent worked to plan</text>

  <!-- ===== particles ===== -->
  <g class="flow"><circle r="11" fill="#f2dcae"/><circle r="6" fill="#b8791a"/></g>
  <g class="cvB"><circle r="10" fill="#d7ebdd"/><circle r="5.5" fill="#1f7a3f"/></g>
  <g class="cvA"><circle r="10" fill="#d7ebdd"/><circle r="5.5" fill="#1f7a3f"/></g>
</svg>
